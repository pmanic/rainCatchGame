<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>rainCatcher</title>
    <link rel="icon" type="image/svg+xml" href="src/assets/images/favicon.svg" />
    <link rel="stylesheet" href="src/styles/main.css" />
</head>
<body>
    <svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false"
         style="position:absolute;width:0;height:0;overflow:hidden">
        <symbol id="logo-mark" viewBox="0 2 260 44" overflow="visible">
            <path d="M16,4 C9,14 0,22 0,30 a16,16,0,0,0,32,0 C32,22 23,14 16,4Z"
                  fill="#4ea5ff"/>
            <text x="42" y="25" dominant-baseline="central" font-family="Fredoka,'Trebuchet MS',sans-serif" font-size="36">
                <tspan font-weight="700" fill="#1a67d2">rain</tspan><tspan font-weight="900" fill="#0d3f8f">Catcher</tspan>
            </text>
        </symbol>
    </svg>

    <div id="start-screen" role="main" aria-label="Start screen">
        <div class="start-bg" aria-hidden="true"></div>

        <div class="bubble" style="--s:70px; --x:8%; --y:18%; --d:0s; --t:5.5s;"></div>
        <div class="bubble" style="--s:40px; --x:17%; --y:65%; --d:1.2s; --t:7s;"></div>
        <div class="bubble" style="--s:90px; --x:30%; --y:38%; --d:0.5s; --t:6s;"></div>
        <div class="bubble" style="--s:55px; --x:45%; --y:72%; --d:2s; --t:8s;"></div>
        <div class="bubble" style="--s:35px; --x:60%; --y:12%; --d:0.8s; --t:5s;"></div>
        <div class="bubble" style="--s:80px; --x:70%; --y:55%; --d:1.6s; --t:7.5s;"></div>
        <div class="bubble" style="--s:48px; --x:82%; --y:28%; --d:0.3s; --t:6.5s;"></div>
        <div class="bubble" style="--s:65px; --x:88%; --y:70%; --d:2.5s; --t:5s;"></div>

        <div class="start-content">
            <svg class="start-logo logo-svg" role="img" aria-label="rainCatcher" viewBox="0 2 260 44"><use href="#logo-mark"/></svg>
            <p class="start-tagline">Catch the rain. Dodge the mud. Keep the bucket ready.</p>
            <label class="name-input-group" for="player-name">
                <span>Your name</span>
                <input id="player-name" type="text" value="Player" maxlength="18" />
            </label>
            <button id="start-btn" class="btn-start" autofocus>Start Catching</button>
        </div>
    </div>

    <div id="page-fill" aria-hidden="true"></div>

    <div class="page-wrapper">
        <div class="game-layout">
            <div id="game-container">
                <canvas id="game-canvas"></canvas>

                <div id="mobile-hud" aria-hidden="true">
                    <span class="mobile-hud-label">Score</span>
                    <span id="mobile-score">0</span>
                </div>

                <div id="mobile-misses" aria-hidden="true">
                    <img class="mobile-miss-drop" data-mobile-index="0" src="src/assets/sprites/storm-cloud.svg" alt="" />
                    <img class="mobile-miss-drop" data-mobile-index="1" src="src/assets/sprites/storm-cloud.svg" alt="" />
                    <img class="mobile-miss-drop" data-mobile-index="2" src="src/assets/sprites/storm-cloud.svg" alt="" />
                </div>
            </div>

            <aside id="game-sidebar" aria-label="Game stats">
                <svg class="sidebar-brand logo-svg" role="img" aria-label="rainCatcher" viewBox="0 2 260 44"><use href="#logo-mark"/></svg>

                <div class="sidebar-card">
                    <div class="sidebar-label">Player</div>
                    <div class="sidebar-level-name" data-player-name>Player</div>
                </div>

                <div class="sidebar-card">
                    <div class="sidebar-label">Score</div>
                    <div class="sidebar-big" id="score-display">0</div>
                </div>

                <div class="sidebar-card">
                    <div class="sidebar-label">Bucket Size</div>
                    <div class="sidebar-level-name" id="level-name">Barrel</div>
                    <div id="level-bars" aria-label="Bucket progress">
                        <div class="level-bar" data-level="0">
                            <span class="level-bar-fill"></span>
                            <span class="level-bar-tag">Barrel</span>
                        </div>
                        <div class="level-bar" data-level="1">
                            <span class="level-bar-fill"></span>
                            <span class="level-bar-tag">Bucket</span>
                        </div>
                        <div class="level-bar" data-level="2">
                            <span class="level-bar-fill"></span>
                            <span class="level-bar-tag">Pail</span>
                        </div>
                        <div class="level-bar" data-level="3">
                            <span class="level-bar-fill"></span>
                            <span class="level-bar-tag">Tin</span>
                        </div>
                    </div>
                    <div class="sidebar-fill-numbers" id="gauge-numbers">Water level: 0 / 12</div>
                </div>

                <div class="sidebar-card">
                    <div class="sidebar-label">Storm Clouds</div>
                    <div id="misses-display" aria-label="Remaining lives">
                        <img class="miss-drop" data-index="0" src="src/assets/sprites/storm-cloud.svg" alt="Storm cloud 1" />
                        <img class="miss-drop" data-index="1" src="src/assets/sprites/storm-cloud.svg" alt="Storm cloud 2" />
                        <img class="miss-drop" data-index="2" src="src/assets/sprites/storm-cloud.svg" alt="Storm cloud 3" />
                    </div>
                </div>

                <div class="sidebar-card sidebar-controls">
                    <div class="sidebar-label">Controls</div>
                    <p class="controls-line">← →   A / D</p>
                    <p class="controls-line">Mouse / Touch</p>
                    <p class="controls-line">Text input on start screen</p>
                </div>
            </aside>
        </div>
    </div>

    <div
        id="gameover-modal"
        class="modal hidden"
        role="dialog"
        aria-modal="true"
        aria-labelledby="modal-title"
    >
        <div class="modal-content">
            <h2 id="modal-title">Storm Over</h2>
            <p>Player: <span data-player-name>Player</span></p>
            <p>Score: <span id="modal-score">0</span></p>
            <p>Best bucket: <span id="modal-level">Barrel</span></p>
            <hr class="modal-divider" />
            <button id="restart-btn" class="btn-restart" autofocus>Catch Again</button>
        </div>
    </div>

    <script type="module" src="src/logic/main.js"></script>
</body>
</html>
