<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 28 32">
  <defs>
    <radialGradient id="wg" cx="40%" cy="35%" r="62%">
      <stop offset="0%"   stop-color="#b3e5fc"/>
      <stop offset="55%"  stop-color="#29b6f6"/>
      <stop offset="100%" stop-color="#0277bd"/>
    </radialGradient>
    <radialGradient id="whl" cx="36%" cy="28%" r="30%">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.6)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>

  <!-- Drop body -->
  <path d="M14 2
    C14 2, 3 14, 3 20
    a11 11 0 0 0 22 0
    C25 14, 14 2, 14 2Z"
    fill="url(#wg)"/>

  <path d="M14 2
    C14 2, 3 14, 3 20
    a11 11 0 0 0 22 0
    C25 14, 14 2, 14 2Z"
    fill="none" stroke="#0277bd" stroke-width="0.8" opacity="0.5"/>

  <!-- Shine -->
  <ellipse cx="10" cy="17" rx="3.5" ry="5"
    fill="url(#whl)"
    transform="rotate(-15 10 17)"/>

  <!-- Star-shaped eyes (playful, not round) -->
  <!-- Left eye -->
  <circle cx="10" cy="20" r="2.8" fill="white"/>
  <circle cx="18" cy="20" r="2.8" fill="white"/>
  <!-- Sparkle pupils -->
  <g fill="#01579b">
    <!-- left pupil cross -->
    <rect x="9.2" y="19.3" width="1.6" height="1.6" rx="0.4"
      transform="rotate(45 10 20)"/>
    <!-- right pupil cross -->
    <rect x="17.2" y="19.3" width="1.6" height="1.6" rx="0.4"
      transform="rotate(45 18 20)"/>
  </g>
  <circle cx="11" cy="19.5" r="0.5" fill="white"/>
  <circle cx="19" cy="19.5" r="0.5" fill="white"/>

  <!-- Cheeks – sky blue tint -->
  <ellipse cx="8"  cy="23.5" rx="3" ry="2" fill="rgba(100,200,255,0.4)"/>
  <ellipse cx="20" cy="23.5" rx="3" ry="2" fill="rgba(100,200,255,0.4)"/>

  <!-- Smile -->
  <path d="M10.5 25 Q14 28 17.5 25"
    stroke="#0277bd" stroke-width="1.3"
    fill="none" stroke-linecap="round"/>

  <!-- Small sparkle on top -->
  <g stroke="#fff" stroke-width="1.2" stroke-linecap="round" opacity="0.8">
    <line x1="22" y1="7"  x2="22" y2="11"/>
    <line x1="20" y1="9"  x2="24" y2="9"/>
  </g>
</svg>
