<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 140 22"
     preserveAspectRatio="none">
  <defs>
    <linearGradient id="padBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#fff9fb"/>
      <stop offset="40%"  stop-color="#fce4ec"/>
      <stop offset="100%" stop-color="#f8bbd0"/>
    </linearGradient>
    <linearGradient id="wingGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#f9cede"/>
      <stop offset="100%" stop-color="#f06292"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.80)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <!-- Main pad shadow -->
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="180%">
      <feDropShadow dx="0" dy="3" stdDeviation="3"
        flood-color="#f48fb1" flood-opacity="0.40"/>
    </filter>
  </defs>

  <!-- ── LEFT WING (drawn first so main body sits on top) ── -->
  <!-- Wing body -->
  <rect x="0" y="8" width="28" height="14" rx="6"
    fill="url(#wingGrad)" stroke="#e91e63" stroke-width="0.9" stroke-opacity="0.6"/>
  <!-- Wing sheen / adhesive highlight -->
  <rect x="2" y="9.5" width="18" height="5" rx="2.5"
    fill="rgba(255,255,255,0.38)"/>
  <!-- Fold crease line at the wing-body junction -->
  <line x1="14" y1="9" x2="14" y2="22"
    stroke="#c2185b" stroke-width="0.9" stroke-opacity="0.30"/>

  <!-- ── RIGHT WING ── -->
  <rect x="112" y="8" width="28" height="14" rx="6"
    fill="url(#wingGrad)" stroke="#e91e63" stroke-width="0.9" stroke-opacity="0.6"/>
  <rect x="120" y="9.5" width="18" height="5" rx="2.5"
    fill="rgba(255,255,255,0.38)"/>
  <line x1="126" y1="9" x2="126" y2="22"
    stroke="#c2185b" stroke-width="0.9" stroke-opacity="0.30"/>

  <!-- ── MAIN PAD BODY (covers wing inner edges) ── -->
  <rect x="14" y="1" width="112" height="20" rx="10"
    fill="url(#padBody)"
    stroke="#f48fb1" stroke-width="1.2"
    filter="url(#shadow)"/>

  <!-- Absorption channel (centre quilted indent) -->
  <rect x="27" y="8" width="86" height="6" rx="3"
    fill="rgba(244,143,177,0.20)"/>

  <!-- Quilting dots along the channel -->
  <g fill="rgba(240,98,146,0.28)">
    <circle cx="36"  cy="11" r="1.5"/>
    <circle cx="50"  cy="11" r="1.5"/>
    <circle cx="64"  cy="11" r="1.5"/>
    <circle cx="78"  cy="11" r="1.5"/>
    <circle cx="92"  cy="11" r="1.5"/>
    <circle cx="106" cy="11" r="1.5"/>
  </g>

  <!-- Top sheen strip -->
  <rect x="18" y="2" width="104" height="6" rx="4"
    fill="url(#sheen)"/>

  <!-- Tiny hearts along channel centre -->
  <g fill="#f48fb1" opacity="0.50">
    <!-- heart at ~43 -->
    <path d="M44 10.5 C44 9.3 42 9.3 42 10.5 C42 11.7 44 12.9 44 13 C44 12.9 46 11.7 46 10.5 C46 9.3 44 9.3 44 10.5Z"/>
    <!-- heart at ~70 -->
    <path d="M71 10.5 C71 9.3 69 9.3 69 10.5 C69 11.7 71 12.9 71 13 C71 12.9 73 11.7 73 10.5 C73 9.3 71 9.3 71 10.5Z"/>
    <!-- heart at ~97 -->
    <path d="M98 10.5 C98 9.3 96 9.3 96 10.5 C96 11.7 98 12.9 98 13 C98 12.9 100 11.7 100 10.5 C100 9.3 98 9.3 98 10.5Z"/>
  </g>
</svg>
